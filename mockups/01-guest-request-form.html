<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request to Book • Bayfront Retreat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
  <div class="max-w-3xl mx-auto py-8 px-4">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-12 h-12 bg-emerald-600 rounded-xl flex items-center justify-center">
        <i class="fa-solid fa-home text-white text-2xl"></i>
      </div>
      <div>
        <h1 class="text-2xl font-semibold text-slate-900">Bayfront Retreat</h1>
        <p class="text-sm text-slate-500">Jamaica Beach, Galveston, TX</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <h2 class="text-xl font-semibold mb-1">Request to Book</h2>
      <p class="text-slate-500 mb-6">Submit your dates and we'll get back to you with availability and pricing.</p>

      <form class="space-y-6">
        <!-- Dates -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Check-in Date</label>
            <input type="date" value="2026-07-10" 
                   class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Check-out Date</label>
            <input type="date" value="2026-07-17" 
                   class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
          </div>
        </div>

        <!-- Guests -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Number of Guests</label>
          <select class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <option>2 guests</option>
            <option>3 guests</option>
            <option selected>4 guests</option>
            <option>5 guests</option>
            <option>6 guests</option>
            <option>7 guests</option>
            <option>8 guests</option>
            <option>9 guests</option>
            <option>10 guests (max)</option>
          </select>
        </div>

        <!-- Contact Info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
            <input type="text" value="Sarah Thompson" 
                   class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
            <input type="tel" value="(713) 555-0192" 
                   class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
          <input type="email" value="sarah.thompson@email.com" 
                 class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>

        <!-- Special Requests -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Special Requests (optional)</label>
          <textarea rows="3" placeholder="Any special requirements or questions?"
                    class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">We have a small dog (well-trained, 25 lbs). Would love to bring her if possible.</textarea>
        </div>

        <div class="pt-4">
          <button type="submit" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-xl transition-colors">
            Submit Booking Request
          </button>
          <p class="text-center text-xs text-slate-500 mt-3">
            You will receive a response within 24 hours with pricing and availability.
          </p>
        </div>
      </form>
    </div>

    <div class="text-center mt-6 text-sm text-slate-500">
      <i class="fa-solid fa-shield-halved mr-1"></i> 
      This is not an instant booking. All requests are subject to approval.
    </div>
  </div>
</body>
</html>
